<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Ti ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="fondo"></div>

<header class="reveal">
<h1>Para ti 💖</h1>
<p>Una pequeña sorpresa</p>
</header>


<section class="reveal">

<h2>💌 Tienes una carta</h2>

<div class="sobre" id="sobre">
<div class="tapa"></div>
<div class="carta">
<p>
Desde que llegaste a mi vida todo es mejor.
Gracias por cada momento juntos.
Te amo muchísimo ❤️
</p>
</div>
</div>

</section>


<section class="reveal">

<h2>⏳ Nuestro tiempo juntos</h2>

<p id="contador"></p>

</section>


<section class="reveal">

<h2>📸 Nuestros recuerdos</h2>

<div class="galeria">

<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
<img src="foto5.jpg">
<img src="foto6.jpg">

</div>

</section>


<section class="reveal">

<button id="sorpresaBtn">🎁 Abrir sorpresa</button>

<div id="sorpresa">
<p>Eres lo mejor que me ha pasado 💖</p>
</div>

</section>


<footer>
<p>Con amor ❤️</p>
</footer>


<script src="script.js"></script>

</body>
</html>
